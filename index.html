<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerari Melaka 2D1N</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse CDN untuk baca fail CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* (Kekalkan semua CSS asal awak di sini, jangan buang) */
        body { background-color: #f4f9f4; color: #4a4a4a; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .hero-section { background: linear-gradient(135deg, #e2f0cb, #ffdfba); padding: 80px 20px; text-align: center; border-bottom: 5px solid #ffb3ba; }
        .hero-title { font-weight: bold; color: #557b83; }
        .floating-icon { color: #ffb3ba; font-size: 3rem; margin-bottom: 15px; }
        .timeline-container { position: relative; padding-left: 40px; margin-bottom: 40px; }
        .timeline-container::before { content: ''; position: absolute; top: 0; bottom: 0; left: 15px; width: 4px; background: #ffdfba; border-radius: 2px; }
        .timeline-item { position: relative; margin-bottom: 30px; }
        .timeline-dot { position: absolute; top: 20px; left: -32.5px; width: 18px; height: 18px; background: #ffb3ba; border: 3px solid #ffffff; border-radius: 50%; z-index: 1; box-shadow: 0 0 0 3px #ffdfba; }
        .timeline-content { background-color: #ffffff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #ffb3ba; }
        .time-badge { background-color: #bae1ff; color: #333; font-weight: bold; font-size: 0.9rem; display: inline-block; margin-bottom: 10px; padding: 5px 12px; border-radius: 20px; }
        .btn-map { background-color: #ffb3ba; color: white; border: none; border-radius: 20px; text-decoration: none; display: inline-block; padding: 6px 15px; margin-top: 10px; }
        .day-header { color: #557b83; margin-top: 40px; margin-bottom: 30px; border-bottom: 2px dashed #bae1ff; padding-bottom: 10px; }
    </style>
</head>
<body>

    <header class="hero-section">
        <i class="fas fa-car-side floating-icon"></i>
        <h1 class="hero-title">ITINERARI MELAKA 2D1N 🌸</h1>
        <p class="lead">Percutian santai, penuh kenangan & pengalaman baru bersama kawan-kawan!</p>
    </header>

    <div class="container my-5" style="max-width: 800px;">
        
        <!-- HARI 1 -->
        <h2 class="day-header"><i class="fas fa-sun"></i> HARI PERTAMA</h2>
        <div class="timeline-container" id="jadual-hari-1">
            <p class="text-muted">Sedang memuat turun data dari Google Sheets...</p>
        </div> 

        <!-- HARI 2 -->
        <h2 class="day-header mt-5"><i class="fas fa-camera"></i> HARI KEDUA</h2>
        <div class="timeline-container" id="jadual-hari-2">
            <p class="text-muted">Sedang memuat turun data dari Google Sheets...</p>
        </div> 

    </div>

    <!-- Skrip Tarik Data Google Sheets -->
    <script>
        // ⚠️ Letak link CSV Google Sheets awak di bawah ini:
        const sheetCSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTjX2OAkeYuSEjh5KJgz4UAHm_R5366vubiPlCs5D7GLq7BHbvpxXzIl6sX_YTIe4svqF4XdxjcWH-/pub?gid=0&single=true&output=csv";

        Papa.parse(sheetCSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                let htmlHari1 = '';
                let htmlHari2 = '';

                data.forEach(row => {
                    // Pastikan baris tak kosong
                    if(row.Aktiviti) {
                        let cardHTML = `
                            <div class="timeline-item">
                                <div class="timeline-dot"></div>
                                <div class="timeline-content">
                                    <span class="time-badge">${row.Masa}</span>
                                    <h5>${row.Aktiviti}</h5>
                                    <p>${row.Penerangan}</p>
                                    ${row.Link_Map ? `<a href="${row.Link_Map}" target="_blank" class="btn btn-map"><i class="fas fa-map-marker-alt"></i> Lihat Lokasi</a>` : ''}
                                </div>
                            </div>
                        `;

                        if(row.Hari == "1") {
                            htmlHari1 += cardHTML;
                        } else if (row.Hari == "2") {
                            htmlHari2 += cardHTML;
                        }
                    }
                });

                // Paparkan ke dalam HTML
                document.getElementById('jadual-hari-1').innerHTML = htmlHari1 || "<p>Tiada aktiviti diletakkan.</p>";
                document.getElementById('jadual-hari-2').innerHTML = htmlHari2 || "<p>Tiada aktiviti diletakkan.</p>";
            }
        });
    </script>
</body>
</html>
